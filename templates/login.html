<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TaskFlow - Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;

    background:
    linear-gradient(
    rgba(10,20,40,0.65),
    rgba(10,20,40,0.75)
    ),
    url('https://images.unsplash.com/photo-1497366754035-f200968a6e72?q=80&w=2070');

    background-size:cover;
    background-position:center;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:'Segoe UI',sans-serif;
}

.login-card{

    width:430px;

    backdrop-filter:blur(18px);

    background:rgba(255,255,255,0.12);

    border:1px solid rgba(255,255,255,0.25);

    border-radius:24px;

    padding:40px;

    color:white;

    box-shadow:
    0 20px 50px rgba(0,0,0,0.35);
}

.logo{

    width:90px;
    height:90px;

    background:white;

    color:#0d6efd;

    border-radius:50%;

    display:flex;

    align-items:center;

    justify-content:center;

    margin:auto;

    margin-bottom:20px;

    font-size:35px;
}

.title{

    text-align:center;

    font-weight:700;

    font-size:32px;

    margin-bottom:5px;
}

.subtitle{

    text-align:center;

    color:#ddd;

    margin-bottom:30px;
}

.form-control{

    height:52px;

    border-radius:12px;

    background:rgba(255,255,255,0.18);

    border:none;

    color:white;
}

.form-control::placeholder{
    color:#e0e0e0;
}

.form-control:focus{

    background:rgba(255,255,255,0.22);

    color:white;

    box-shadow:none;
}

.input-group-text{

    background:rgba(255,255,255,0.18);

    color:white;

    border:none;
}

.btn-login{

    height:52px;

    border-radius:12px;

    font-weight:600;

    font-size:17px;
}

.footer-text{

    text-align:center;

    margin-top:20px;

    color:#ddd;

    font-size:14px;
}

</style>

</head>
<body>

<div class="login-card">

    <div class="logo">
        <i class="fa-solid fa-list-check"></i>
    </div>

    <h2 class="title">
        TaskFlow
    </h2>

    <p class="subtitle">
        Employee Task Management System
    </p>

    <form action="/check" method="post">

        <div class="input-group mb-3">

            <span class="input-group-text">
                <i class="fa-solid fa-user"></i>
            </span>

            <input
            type="text"
            class="form-control"
            name="username"
            placeholder="Username"
            required>

        </div>

        <div class="input-group mb-4">

            <span class="input-group-text">
                <i class="fa-solid fa-lock"></i>
            </span>

            <input
            type="password"
            class="form-control"
            name="password"
            placeholder="Password"
            required>

        </div>

        <button
        type="submit"
        class="btn btn-primary w-100 btn-login">

            <i class="fa-solid fa-right-to-bracket"></i>
            Login

        </button>

    </form>

    <div class="footer-text">
        MIS & Task Delegation Portal
    </div>

</div>

</body>
</html>
