<!DOCTYPE html>
<html>
<head>
    <title>Employee Panel</title>
</head>
<body>

<h2>Employee Dashboard</h2>

<h3>My Tasks</h3>

<table border="1">

<tr>
    <th>Task</th>
    <th>Status</th>
    <th>Action</th>
</tr>

{% for task in tasks %}

<tr>
    <td>{{ task.title }}</td>

    <td>
        <b>{{ task.status }}</b>
    </td>

    <td>
        <form action="/update_status/{{ task._id }}" method="post">

            <select name="status">

                <option value="Pending"
                    {% if task.status == "Pending" %}selected{% endif %}>
                    Pending
                </option>

                <option value="In Progress"
                    {% if task.status == "In Progress" %}selected{% endif %}>
                    In Progress
                </option>

                <option value="Completed"
                    {% if task.status == "Completed" %}selected{% endif %}>
                    Completed
                </option>

            </select>

            <button type="submit">
                Update
            </button>

        </form>
    </td>
</tr>

{% endfor %}

</table>

</body>
</html>
