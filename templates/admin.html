    <!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
</head>
<body>

<h2>Admin Panel</h2>

<hr>

<h3>Add User</h3>

<form action="/add_user" method="post">

    <input type="text"
           name="username"
           placeholder="Username"
           required>

    <input type="password"
           name="password"
           placeholder="Password"
           required>

    <button type="submit">
        Add User
    </button>

</form>

<hr>
<h3>Create Task</h3>
<form action="/create_task" method="post">

    <input type="text"
           name="title"
           placeholder="Task Title"
           required>

    <input type="text"
           name="assigned_to"
           placeholder="Employee Username"
           required>

    <select name="priority">
        <option value="High">High</option>
        <option value="Medium">Medium</option>
        <option value="Low">Low</option>
    </select>

    <input type="date"
           name="due_date"
           required>

    <button type="submit">
        Create Task
    </button>

</form>

</form>

<hr>
<h3>All Users</h3>

<table border="1">

<tr>
    <th>Username</th>
    <th>Role</th>
    <th>Action</th>
</tr>

{% for user in users %}

<tr>
    <td>{{ user.username }}</td>
    <td>{{ user.role }}</td>

    <td>

        <form action="/delete_user" method="post">

            <input type="hidden"
                   name="username"
                   value="{{ user.username }}">

            <button type="submit">
                Delete
            </button>

        </form>

    </td>

</tr>

{% endfor %}

</table>
<h3>All Tasks</h3>

<table border="1">

<tr>
    <th>Task</th>
    <th>Assigned To</th>
    <th>Status</th>
</tr>

{% for task in tasks %}

<tr>
    <td>{{ task.title }}</td>
    <td>{{ task.assigned_to }}</td>
    <td>{{ task.status }}</td>
</tr>

{% endfor %}

</table>

</body>
</html>
